<div class="page-shell">
  <header class="topbar">
    <h1 class="topbar-title">لوحة مدير الفرع</h1>
    <button class="btn-logout" (click)="auth.logout()">خروج</button>
  </header>

  <main class="page-content">
    <p class="welcome">مرحباً {{ name }}</p>

    <div class="menu-grid">
      <a class="menu-card" [routerLink]="['/branch-manager/staff']">
        <span class="menu-icon">&#128101;</span>
        <span class="menu-label">دعوة موظف</span>
        <span class="menu-sub">إنشاء رابط تفعيل</span>
      </a>
      <a class="menu-card" [routerLink]="['/owner/users']">
        <span class="menu-icon">&#128203;</span>
        <span class="menu-label">قائمة الموظفين</span>
        <span class="menu-sub">عرض وإدارة أدوار موظفي الفرع</span>
      </a>
      <a class="menu-card" [routerLink]="['/owner/branches']">
        <span class="menu-icon">&#127978;</span>
        <span class="menu-label">بيانات الفرع</span>
        <span class="menu-sub">عرض معلومات الفرع</span>
      </a>
      <a class="menu-card" [routerLink]="['/categories']">
        <span class="menu-icon">&#127991;</span>
        <span class="menu-label">التصنيفات</span>
        <span class="menu-sub">إدارة تصنيفات قائمة الطعام</span>
      </a>
      <a class="menu-card" [routerLink]="['/menu']">
        <span class="menu-icon">&#127869;</span>
        <span class="menu-label">إدارة القائمة</span>
        <span class="menu-sub">الأقسام والمنتجات والمجموعات</span>
      </a>
    </div>
  </main>
</div>
