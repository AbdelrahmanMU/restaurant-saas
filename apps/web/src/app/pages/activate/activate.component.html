<div class="auth-shell">
<div class="activate-page">

  <!-- ── Hero ── -->
  <div class="activate-hero">
    <span class="welcome-emoji">🎉</span>
    <h2>مرحباً بك في الفريق!</h2>
    <p>أنت مدعوّ للانضمام. أكمل بياناتك لتفعيل حسابك.</p>
  </div>

  <!-- ── Card wrap (overlaps hero) ── -->
  <div class="activate-card-wrap">

    <!-- Invalid token notice -->
    <div class="invalid-notice" *ngIf="tokenMissing">
      <span class="invalid-notice-icon">⚠️</span>
      <div>
        <div class="invalid-notice-title">رابط غير صالح</div>
        <div class="invalid-notice-body">هذا الرابط غير صحيح أو منتهي. يرجى التواصل مع المدير للحصول على رابط دعوة جديد.</div>
      </div>
    </div>

    <!-- Activation form -->
    <ng-container *ngIf="!tokenMissing">
      <div class="activate-inner">

        <div class="card-title">أكمل بياناتك</div>

        <form class="form-stack" (ngSubmit)="submit()" novalidate>

          <div class="input-group">
            <label for="fullName">الاسم الكامل</label>
            <input
              id="fullName"
              class="input-field"
              type="text"
              placeholder="أدخل اسمك الكامل"
              [(ngModel)]="fullName"
              name="fullName"
              autocomplete="name"
              [disabled]="loading"
            />
          </div>

          <div class="input-group">
            <label for="phone">رقم الجوال</label>
            <input
              id="phone"
              class="input-field input-ltr"
              type="tel"
              placeholder="05xxxxxxxx"
              [(ngModel)]="phone"
              name="phone"
              autocomplete="tel"
              inputmode="tel"
              [disabled]="loading"
            />
          </div>

          <div class="input-group">
            <label for="password">كلمة المرور</label>
            <div class="input-password-wrap">
              <input
                id="password"
                class="input-field"
                [type]="showPassword ? 'text' : 'password'"
                placeholder="اختر كلمة مرور قوية"
                [(ngModel)]="password"
                name="password"
                autocomplete="new-password"
                [disabled]="loading"
              />
              <button type="button" class="input-eye" (click)="togglePassword()">
                {{ showPassword ? '🙈' : '👁️' }}
              </button>
            </div>
          </div>

          <div class="input-group">
            <label for="confirmPassword">تأكيد كلمة المرور</label>
            <div class="input-password-wrap">
              <input
                id="confirmPassword"
                class="input-field"
                [type]="showConfirmPassword ? 'text' : 'password'"
                placeholder="أعد كتابة كلمة المرور"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                autocomplete="new-password"
                [disabled]="loading"
              />
              <button type="button" class="input-eye" (click)="toggleConfirmPassword()">
                {{ showConfirmPassword ? '🙈' : '👁️' }}
              </button>
            </div>
          </div>

          <div class="auth-error" *ngIf="error" role="alert">{{ error }}</div>

          <button type="submit" class="auth-btn auth-btn-primary" [disabled]="loading">
            <span class="btn-spinner" *ngIf="loading"></span>
            <span *ngIf="!loading">تفعيل الحساب</span>
          </button>

        </form>
      </div>
    </ng-container>

  </div>

</div>
</div>

<ui-success-modal
  *ngIf="showSuccess"
  icon="🚀"
  iconBg="#EDE9FE"
  title="تم تفعيل حسابك!"
  message="مرحباً بك في الفريق. حسابك جاهز للاستخدام الآن."
  actionLabel="بدء العمل"
  (proceed)="onSuccessProceed()"
></ui-success-modal>
