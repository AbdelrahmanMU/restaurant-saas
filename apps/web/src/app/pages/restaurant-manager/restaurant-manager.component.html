<ui-dashboard-layout
  pageTitle="لوحة مدير المطعم"
  [userName]="name"
  (logoutClick)="auth.logout()">

  <!-- ── Summary stats ──────────────────────────────────────── -->
  <section class="section">
    <h2 class="section-title">إحصائيات سريعة</h2>

    <div class="stats-grid">
      <div class="stat-card" *ngFor="let s of stats"
           [style.--accent]="s.accent">
        <span class="stat-icon">{{ s.icon }}</span>
        <span class="stat-value">{{ s.value }}</span>
        <span class="stat-label">{{ s.label }}</span>
      </div>
    </div>
  </section>

  <!-- ── Owner / RestaurantManager: manage users & branches ── -->
  <section class="section" *ngIf="canManageUsers">
    <button class="btn-manage-users" (click)="manageUsers()">
      <span class="btn-manage-icon">👥</span>
      <span class="btn-manage-text">
        <span class="btn-manage-label">إدارة الموظفين والأدوار</span>
        <span class="btn-manage-sub">عرض وتعديل أدوار الموظفين</span>
      </span>
      <span class="btn-manage-arrow">&#8592;</span>
    </button>
    <button class="btn-manage-users" (click)="manageBranches()" *ngIf="isOwner">
      <span class="btn-manage-icon">🏪</span>
      <span class="btn-manage-text">
        <span class="btn-manage-label">إدارة الفروع</span>
        <span class="btn-manage-sub">إنشاء الفروع وتعيين المدراء</span>
      </span>
      <span class="btn-manage-arrow">&#8592;</span>
    </button>
    <button class="btn-manage-users" (click)="manageMenu()">
      <span class="btn-manage-icon">🍽️</span>
      <span class="btn-manage-text">
        <span class="btn-manage-label">إدارة القائمة</span>
        <span class="btn-manage-sub">الأقسام والمنتجات والمجموعات والحزم</span>
      </span>
      <span class="btn-manage-arrow">&#8592;</span>
    </button>
  </section>

  <!-- ── Staff management ───────────────────────────────────── -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">إدارة الموظفين</h2>
      <button class="btn-invite" (click)="inviteStaff()">
        <span class="btn-invite-icon">+</span>
        دعوة موظف جديد
      </button>
    </div>

    <div class="staff-list">
      <div class="staff-card" *ngFor="let member of staff">
        <div class="staff-avatar">
          {{ member.name.charAt(0) }}
        </div>
        <div class="staff-info">
          <span class="staff-name">{{ member.name }}</span>
          <span class="staff-role">{{ member.role }}</span>
        </div>
        <span class="staff-badge"
              [class.badge-active]="member.status === 'active'"
              [class.badge-pending]="member.status === 'pending'">
          {{ member.status === 'active' ? 'نشط' : 'في الانتظار' }}
        </span>
      </div>
    </div>
  </section>

</ui-dashboard-layout>
