<div class="page">
  <div class="card">

    <div class="brand">
      <div class="brand-icon">🍽️</div>
      <h1 class="brand-name">نظام المطاعم</h1>
      <p class="brand-tagline">أدر مطعمك بسهولة</p>
    </div>

    <form class="form" (ngSubmit)="submit()" #f="ngForm" novalidate>

      <div class="field">
        <label for="phone">رقم الهاتف</label>
        <input
          id="phone"
          type="tel"
          [(ngModel)]="phone"
          name="phone"
          placeholder=""
          autocomplete="tel"
          inputmode="tel"
          [disabled]="loading"
        />
      </div>

      <div class="field">
        <label for="password">كلمة المرور</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          [disabled]="loading"
        />
      </div>

      <p class="error-msg" *ngIf="error" role="alert">{{ error }}</p>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">دخول</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>

    <div class="footer-links">
      <span>مالك مطعم جديد؟</span>
      <a routerLink="/register">سجّل مطعمك</a>
    </div>

  </div>
</div>
