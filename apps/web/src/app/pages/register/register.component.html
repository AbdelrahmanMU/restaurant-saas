<div class="page">
  <div class="card">

    <div class="header">
      <h1>سجّل مطعمك</h1>
      <p>أنشئ حسابك وابدأ إدارة مطعمك الآن</p>
    </div>

    <form class="form" (ngSubmit)="submit()" novalidate>

      <div class="field">
        <label for="fullName">اسمك الكامل</label>
        <input
          id="fullName"
          type="text"
          [(ngModel)]="fullName"
          name="fullName"
          placeholder="محمد عبدالله"
          autocomplete="name"
          [disabled]="loading"
        />
      </div>

      <div class="field">
        <label for="phone">رقم الهاتف</label>
        <input
          id="phone"
          type="tel"
          [(ngModel)]="phone"
          name="phone"
          placeholder=""
          autocomplete="tel"
          inputmode="tel"
          [disabled]="loading"
        />
      </div>

      <div class="field">
        <label for="password">كلمة المرور</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="8 أحرف على الأقل"
          autocomplete="new-password"
          [disabled]="loading"
        />
      </div>

      <div class="field">
        <label for="restaurantName">اسم المطعم</label>
        <input
          id="restaurantName"
          type="text"
          [(ngModel)]="restaurantName"
          name="restaurantName"
          placeholder="مطعم الشيف"
          [disabled]="loading"
        />
      </div>

      <p class="error-msg" *ngIf="error" role="alert">{{ error }}</p>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">إنشاء الحساب</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>

    <div class="footer-links">
      <span>لديك حساب؟</span>
      <a routerLink="/login">سجّل دخولك</a>
    </div>

  </div>
</div>
