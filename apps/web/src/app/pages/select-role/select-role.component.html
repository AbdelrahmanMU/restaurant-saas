<div class="page-shell">

  <!-- Hero header -->
  <header class="hero">
    <div class="hero-icon">👋</div>
    <h1 class="hero-title">أهلاً{{ name ? '، ' + name : '' }}</h1>
    <p class="hero-sub">اختر الدور الذي تريد العمل به الآن</p>
  </header>

  <!-- Role picker -->
  <main class="page-content">
    <div class="roles-list">
      <button
        class="role-card"
        *ngFor="let r of roleOptions"
        (click)="select(r.value)">

        <span class="role-icon">{{ r.icon }}</span>

        <div class="role-text">
          <span class="role-label">{{ r.label }}</span>
          <span class="role-desc">{{ r.description }}</span>
        </div>

        <span class="role-chevron">&#8592;</span>
      </button>
    </div>

    <button class="btn-logout" (click)="auth.logout()">تسجيل الخروج</button>
  </main>

</div>
